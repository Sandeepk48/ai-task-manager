# Local PostgreSQL for AI Task Manager (matches backend/.env defaults)
# Usage: docker compose up -d
# Then: cd backend && npx prisma migrate deploy && npm run start:dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-task-manager-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_task_manager
    volumes:
      - ai_task_manager_pgdata:/var/lib/postgresql/data

volumes:
  ai_task_manager_pgdata:
